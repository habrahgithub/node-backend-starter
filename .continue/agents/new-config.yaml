# Continue Configuration File - Multi-Provider Free Setup
# To learn more, see the full config.yaml reference: https://docs.continue.dev/reference

name: "Prime Multi-Model Free Setup"
version: "1.0.0"
schema: v1

# Define which models can be used (prioritized by coding power)
# https://docs.continue.dev/customization/models
models:
  - name: OpenRouter Free Llama 3
    provider: openrouter
    model: meta-llama/llama-3-8b-instruct:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: OpenRouter Free Qwen Coder
    provider: openrouter
    model: qwen/qwen-2-5-coder-32b-instruct:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: Google Gemini Flash Lite
    provider: google
    model: gemini-2.5-flash-lite
    apiKey: ${{ secrets.GOOGLE_API_KEY }}
  - name: Groq Llama 3.1 70B
    provider: groq
    model: llama-3.1-70b-versatile
    apiKey: ${{ secrets.GROQ_API_KEY }}
  - name: OpenAI GPT-4o Mini
    provider: openai
    model: gpt-4o-mini
    apiKey: ${{ secrets.OPENAI_API_KEY }}
  - name: Ollama Qwen Coder
    provider: ollama
    model: qwen2.5-coder:latest
    apiKey: ${{ secrets.OLLAMA_API_KEY }}
    apiBase: "http://localhost:11434"

# Context providers for code understanding
# https://docs.continue.dev/customization/context
context:
  - provider: codebase
    exclude_patterns:
      - "*.log"
      - "node_modules/**"
      - ".git/**"
      - "dist/**"
      - "build/**"
      - "*.min.js"
      - "*.min.css"
  - provider: file_tree
  - provider: current_dir
  - provider: url
  - provider: docs

# Custom slash commands for common tasks
# https://docs.continue.dev/customization/slash-commands
slash_commands:
  - name: test
    description: "Generate unit tests for selected code"
    prompt: |
      Generate comprehensive unit tests for the following code.
      Include edge cases and mock any dependencies.
      Use the testing framework that's already in the project.

      {{clipboard}}

  - name: explain
    description: "Explain how the selected code works"
    prompt: |
      Explain the following code in simple terms.
      Include what it does, how it works, and any important considerations.

      {{clipboard}}

  - name: refactor
    description: "Refactor selected code for better quality"
    prompt: |
      Refactor the following code to improve:
      - Readability
      - Performance
      - Best practices
      - Error handling

      {{clipboard}}

  - name: docs
    description: "Generate documentation for selected code"
    prompt: |
      Generate documentation for the following code.
      Include JSDoc comments and explain parameters and return values.

      {{clipboard}}

  - name: fix
    description: "Fix bugs or issues in selected code"
    prompt: |
      Analyze the following code for potential bugs or issues.
      Provide a fixed version with explanations.

      {{clipboard}}

# Autocomplete settings
# https://docs.continue.dev/customization/autocomplete
autocomplete:
  enabled: true

# UI settings
# https://docs.continue.dev/customization/ui
ui:
  show_model_in_status_bar: true
  enable_code_lens: true
  theme: system

# Experimental features
# https://docs.continue.dev/customization/experimental
experimental:
  streaming: true
  context_caching: true

# API settings
# https://docs.continue.dev/customization/api
api:
  timeout_ms: 120000
  max_retries: 3
  retry_delay_ms: 1000
  connection_pooling: true

# MCP Servers that Continue can access
# https://docs.continue.dev/customization/mcp-tools
mcpServers:
  - uses: anthropic/memory-mcp
