# Continue Configuration File
# https://docs.continue.dev/customization/config

name: "Prime Multi-Model Free Setup"
version: "1.0.0"
description: "Multi-provider setup with FREE models prioritized. Ordered by coding power (strongest first)"

models:
  - title: OpenRouter Free Llama 3
    provider: openrouter
    model: meta-llama/llama-3-8b-instruct:free
    api_key: "${OPENROUTER_API_KEY}"
  - title: OpenRouter Free Qwen Coder
    provider: openrouter
    model: qwen/qwen-2-5-coder-32b-instruct:free
    api_key: "${OPENROUTER_API_KEY}"
  - title: Google Gemini Flash Lite
    provider: google
    model: gemini-2.5-flash-lite
    api_key: "${GOOGLE_API_KEY}"
  - title: Groq Llama 3.1 70B
    provider: groq
    model: llama-3.1-70b-versatile
    api_key: "${GROQ_API_KEY}"
  - title: OpenAI GPT-4o Mini
    provider: openai
    model: gpt-4o-mini
    api_key: "${OPENAI_API_KEY}"
  - title: Ollama Qwen Coder
    provider: ollama
    model: qwen2.5-coder:latest
    api_key: "${OLLAMA_API_KEY}"
    api_base: "http://localhost:11434"

context:
  - provider: codebase
    exclude_patterns:
      - "*.log"
      - "node_modules/**"
      - ".git/**"
      - "dist/**"
      - "build/**"
      - "*.min.js"
      - "*.min.css"
  - provider: file_tree
  - provider: current_dir
  - provider: url
  - provider: docs

slash_commands:
  - name: test
    description: "Generate unit tests for selected code"
    prompt: |
      Generate comprehensive unit tests for the following code.
      Include edge cases and mock any dependencies.
      Use the testing framework that's already in the project.

      {{clipboard}}

  - name: explain
    description: "Explain how the selected code works"
    prompt: |
      Explain the following code in simple terms.
      Include what it does, how it works, and any important considerations.

      {{clipboard}}

  - name: refactor
    description: "Refactor selected code for better quality"
    prompt: |
      Refactor the following code to improve:
      - Readability
      - Performance
      - Best practices
      - Error handling

      {{clipboard}}

  - name: docs
    description: "Generate documentation for selected code"
    prompt: |
      Generate documentation for the following code.
      Include JSDoc comments and explain parameters and return values.

      {{clipboard}}

  - name: fix
    description: "Fix bugs or issues in selected code"
    prompt: |
      Analyze the following code for potential bugs or issues.
      Provide a fixed version with explanations.

      {{clipboard}}

autocomplete:
  enabled: true

ui:
  show_model_in_status_bar: true
  enable_code_lens: true
  theme: system

experimental:
  streaming: true
  context_caching: true

api:
  timeout_ms: 120000
  max_retries: 3
  retry_delay_ms: 1000
  connection_pooling: true
