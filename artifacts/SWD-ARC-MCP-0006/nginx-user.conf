worker_processes 1;
pid nginx.pid;
error_log error.log info;

events { worker_connections 256; }

http {
  access_log access.log;
  limit_req_zone $binary_remote_addr zone=swdlimit:10m rate=10r/s;
  limit_req_status 429;

  map $http_x_gateway_token $auth_ok {
    default 0;
    swd-arc-gw-0006 1;
  }

  server {
    listen 8444 ssl;
    server_name 127.0.0.1;

    ssl_certificate /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/tls.crt;
    ssl_certificate_key /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/tls.key;

    client_body_temp_path /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/nginx-runtime/client_body;
    proxy_temp_path /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/nginx-runtime/proxy;
    fastcgi_temp_path /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/nginx-runtime/fastcgi;
    uwsgi_temp_path /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/nginx-runtime/uwsgi;
    scgi_temp_path /home/habib/workspace/artifacts/SWD-ARC-MCP-0006/nginx-runtime/scgi;

    if ($auth_ok = 0) { return 401; }

    location / {
      limit_req zone=swdlimit burst=10 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:3000;
      proxy_set_header Connection "";
      proxy_set_header Authorization "Bearer dev-key";
      proxy_pass http://127.0.0.1:3000;
    }
  }
}
